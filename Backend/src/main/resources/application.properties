spring.application.name=demo

# Cau hình server
server.port = 8080

# 1. Cấu hình thông tin kết nối Database
spring.datasource.url=jdbc:mysql://localhost:3306/quizlet_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
# 2. Cấu hình Hibernate / JPA
# update: Tự động tạo bảng hoặc thêm cột mới vào DB dựa trên Entity Java mà không làm mất dữ liệu cũ
spring.jpa.hibernate.ddl-auto=update

# Hiển thị các câu lệnh SQL mà Spring Boot đang chạy ngầm bên dưới lên màn hình Console (Rất tiện để debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Định dạng SQL phù hợp với phiên bản MySQL của bạn
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect